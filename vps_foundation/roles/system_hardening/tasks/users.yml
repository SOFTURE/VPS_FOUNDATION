---
- name: Create application group
  ansible.builtin.group:
    name: "{{ vps_app_group }}"
    state: present
  tags: users

- name: Create application user
  ansible.builtin.user:
    name: "{{ vps_app_user }}"
    group: "{{ vps_app_group }}"
    groups: sudo
    append: true
    shell: "{{ vps_app_user_shell }}"
    home: "{{ vps_app_user_home }}"
    create_home: true
    state: present
  tags: users

- name: Create .ssh directory for application user
  ansible.builtin.file:
    path: "{{ vps_app_user_home }}/.ssh"
    state: directory
    owner: "{{ vps_app_user }}"
    group: "{{ vps_app_group }}"
    mode: '0700'
  tags: users

- name: Prompt for Local Machine SSH public key if not provided
  ansible.builtin.pause:
    prompt: |

      ================================================================================
      LOCAL MACHINE - SSH PUBLIC KEY REQUIRED
      ================================================================================
      Please paste your LOCAL MACHINE SSH PUBLIC key (starts with 'ssh-rsa', 'ssh-ed25519', etc.):
  register: ssh_key_prompt_local
  when:
    - vps_prompt_for_ssh_key | bool
    - vps_app_user_ssh_public_key_local | length == 0
  tags: users

- name: Set Local Machine SSH public key from prompt
  ansible.builtin.set_fact:
    vps_app_user_ssh_public_key_local: "{{ ssh_key_prompt_local.user_input | trim }}"
  when:
    - ssh_key_prompt_local is defined
    - ssh_key_prompt_local.user_input is defined
    - ssh_key_prompt_local.user_input | trim | length > 0
  tags: users

- name: Prompt for GitHub Actions SSH public key if not provided
  ansible.builtin.pause:
    prompt: |

      ================================================================================
      GITHUB ACTIONS - SSH PUBLIC KEY (OPTIONAL)
      ================================================================================
      Please paste your GITHUB ACTIONS SSH PUBLIC key (starts with 'ssh-rsa', 'ssh-ed25519', etc.)
      Press ENTER to skip:
  register: ssh_key_prompt_github_actions
  when:
    - vps_prompt_for_ssh_key | bool
    - vps_app_user_ssh_public_key_github_actions | length == 0
  tags: users

- name: Set GitHub Actions SSH public key from prompt
  ansible.builtin.set_fact:
    vps_app_user_ssh_public_key_github_actions: "{{ ssh_key_prompt_github_actions.user_input | trim }}"
  when:
    - ssh_key_prompt_github_actions is defined
    - ssh_key_prompt_github_actions.user_input is defined
    - ssh_key_prompt_github_actions.user_input | trim | length > 0
  tags: users

- name: Validate Local Machine SSH key is provided
  ansible.builtin.fail:
    msg: "Local Machine SSH public key is required!"
  when: vps_app_user_ssh_public_key_local | length == 0
  tags: users

- name: Write Local Machine SSH public key (exclusive - overwrites authorized_keys)
  ansible.posix.authorized_key:
    user: "{{ vps_app_user }}"
    key: "{{ vps_app_user_ssh_public_key_local }}"
    comment: "local-machine"
    state: present
    exclusive: true
  tags: users

- name: Add GitHub Actions SSH public key
  ansible.posix.authorized_key:
    user: "{{ vps_app_user }}"
    key: "{{ vps_app_user_ssh_public_key_github_actions }}"
    comment: "github-actions"
    state: present
    exclusive: false
  when: vps_app_user_ssh_public_key_github_actions | length > 0
  tags: users

- name: Ensure correct permissions on authorized_keys
  ansible.builtin.file:
    path: "{{ vps_app_user_home }}/.ssh/authorized_keys"
    owner: "{{ vps_app_user }}"
    group: "{{ vps_app_group }}"
    mode: '0600'
  tags: users

- name: Count expected SSH keys
  ansible.builtin.set_fact:
    expected_ssh_key_count: "{{ 2 if vps_app_user_ssh_public_key_github_actions | length > 0 else 1 }}"
  tags: users

- name: Verify SSH keys were written correctly
  ansible.builtin.command:
    cmd: "grep -c 'ssh-' {{ vps_app_user_home }}/.ssh/authorized_keys"
  register: ssh_key_check
  changed_when: false
  failed_when: ssh_key_check.rc != 0 or ssh_key_check.stdout | int < expected_ssh_key_count | int
  tags: users

- name: Set up passwordless sudo for application user
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/{{ vps_app_user }}
    line: '{{ vps_app_user }} ALL=(ALL) NOPASSWD:ALL'
    create: true
    validate: 'visudo -cf %s'
    mode: '0440'
  tags: users
