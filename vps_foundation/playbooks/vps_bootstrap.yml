---
- name: Ensure host keys are in known_hosts
  hosts: all
  gather_facts: false
  become: false
  tags: always

  tasks:
    - name: Scan host key
      ansible.builtin.command:
        cmd: "ssh-keyscan -p {{ ansible_port | default(22) }} {{ ansible_host }}"
      delegate_to: localhost
      register: host_key_scan
      changed_when: false
      throttle: 1

    - name: Ensure host key is up to date in known_hosts
      ansible.builtin.known_hosts:
        name: "{{ ansible_host }}"
        key: "{{ item }}"
        path: "~/.ssh/known_hosts"
        state: present
      delegate_to: localhost
      loop: "{{ host_key_scan.stdout_lines | default([]) }}"
      when: host_key_scan.stdout_lines | default([]) | length > 0
      throttle: 1

- name: Bootstrap VPS Server
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Wait for system to be ready
      ansible.builtin.wait_for_connection:
        timeout: 300
      tags: always

    - name: Gather facts
      ansible.builtin.setup:
      tags: always

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - vps_app_user is defined
          - vps_app_user | length > 0
        fail_msg: "vps_app_user must be defined"
        success_msg: "Required variables validated"
      tags: always

    - name: Check if this is Ubuntu 22.04+
      ansible.builtin.fail:
        msg: "This playbook requires Ubuntu 22.04 or later"
      when: ansible_facts['distribution'] != "Ubuntu" or ansible_facts['distribution_version'] is version('22.04', '<')
      tags: always

    - name: Display target system information
      ansible.builtin.debug:
        msg:
          - "Bootstrapping VPS Server: {{ ansible_facts['hostname'] }}"
          - "OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"
          - "Architecture: {{ ansible_facts['architecture'] }}"
          - "App User: {{ vps_app_user }}"
          - "Timezone: {{ vps_timezone | default('UTC') }}"
      tags: always

  roles:
    - role: softure.vps_foundation.system_hardening
      tags: [system, hardening]

    - role: softure.vps_foundation.docker_engine
      tags: [docker]

  post_tasks:
    - name: Bootstrap completed
      ansible.builtin.debug:
        msg:
          - "VPS Bootstrap completed successfully!"
          - "User '{{ vps_app_user }}' created with Docker access"
          - "SSH hardened, firewall enabled, fail2ban configured"
          - ""
          - "Next steps:"
          - "1. Run vps-deploy-infrastructure for services"
          - "2. Run your application deployment playbook"
      tags: always
