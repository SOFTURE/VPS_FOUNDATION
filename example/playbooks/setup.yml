---
# =============================================================================
# Full VPS Setup
# =============================================================================
# 1. Bootstrap: system hardening (SSH, firewall, fail2ban) + Docker
# 2. Infrastructure: deploy selected services as Docker containers
#
# Usage:
#   Full setup:      ansible-playbook -i inventory/hosts.yml playbooks/setup.yml
#   Bootstrap only:  ansible-playbook -i inventory/hosts.yml playbooks/setup.yml --tags bootstrap
#   Infra only:      ansible-playbook -i inventory/hosts.yml playbooks/setup.yml --tags infrastructure
#   Single service:  ansible-playbook -i inventory/hosts.yml playbooks/setup.yml --tags postgres
# =============================================================================

- name: "Phase 1: Bootstrap VPS"
  ansible.builtin.import_playbook: softure.vps_foundation.vps_bootstrap
  vars:
    vps_app_user: "{{ vps_app_user }}"
    vps_app_group: "{{ vps_app_group }}"
    vps_timezone: "{{ vps_timezone }}"
    vps_locale: "{{ vps_locale }}"
  tags: [bootstrap]

- name: "Phase 2: Deploy Infrastructure"
  ansible.builtin.import_playbook: softure.vps_foundation.vps_deploy_infrastructure
  vars:
    services_network: "app-network"
    services_postgres_enabled: false
    services_mssql_enabled: false
    services_rabbitmq_enabled: false
    services_caddy_enabled: false
    services_seq_enabled: false
    services_typesense_enabled: false
    services_portainer_enabled: false
    services_supertokens_enabled: false
    services_pgadmin_enabled: false
  tags: [infrastructure]
