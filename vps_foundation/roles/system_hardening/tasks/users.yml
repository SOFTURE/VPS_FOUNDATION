---
- name: Create application group
  ansible.builtin.group:
    name: "{{ vps_app_group }}"
    state: present
  tags: users

- name: Create application user
  ansible.builtin.user:
    name: "{{ vps_app_user }}"
    group: "{{ vps_app_group }}"
    groups: sudo
    append: true
    shell: "{{ vps_app_user_shell }}"
    home: "{{ vps_app_user_home }}"
    create_home: true
    state: present
  tags: users

- name: Create .ssh directory for application user
  ansible.builtin.file:
    path: "{{ vps_app_user_home }}/.ssh"
    state: directory
    owner: "{{ vps_app_user }}"
    group: "{{ vps_app_group }}"
    mode: '0700'
  tags: users

- name: Check if authorized_keys already exists on remote
  ansible.builtin.stat:
    path: "{{ vps_app_user_home }}/.ssh/authorized_keys"
  register: existing_authorized_keys
  tags: users

- name: Read existing authorized_keys content
  ansible.builtin.slurp:
    src: "{{ vps_app_user_home }}/.ssh/authorized_keys"
  register: existing_authorized_keys_content
  when: existing_authorized_keys.stat.exists
  tags: users

- name: Detect existing SSH keys on remote
  ansible.builtin.set_fact:
    existing_ssh_keys: "{{ (existing_authorized_keys_content.content | b64decode).strip() }}"
  when:
    - existing_authorized_keys.stat.exists
    - existing_authorized_keys_content is defined
    - existing_authorized_keys_content.content is defined
  tags: users

- name: Detect Termius-generated SSH key on remote
  ansible.builtin.set_fact:
    termius_key_found: "{{ existing_ssh_keys is defined and 'Generated By Termius' in existing_ssh_keys }}"
  tags: users

- name: Extract Termius key from authorized_keys
  ansible.builtin.set_fact:
    vps_app_user_ssh_public_key_local: "{{ item }}"
  loop: "{{ existing_ssh_keys.split('\n') }}"
  when:
    - termius_key_found | bool
    - "'Generated By Termius' in item"
    - item | trim | length > 0
  tags: users

- name: Validate existing Termius SSH key format
  ansible.builtin.assert:
    that:
      - vps_app_user_ssh_public_key_local is regex('^(ssh-rsa|ssh-ed25519|ecdsa-sha2-nistp[0-9]+) [A-Za-z0-9+/=]+ ?.*$')
    fail_msg: |
      Existing Termius SSH key on remote appears invalid!
      Key starts with: {{ vps_app_user_ssh_public_key_local[:50] }}...
      Make sure the key in authorized_keys is valid.
  when: termius_key_found | bool
  tags: users

- name: Display Termius key detected - skipping local SSH key prompt
  ansible.builtin.debug:
    msg: |
      ================================================================================
      TERMIUS SSH KEY DETECTED ON REMOTE - SKIPPING LOCAL KEY PROMPT
      ================================================================================
      Found valid Termius-generated SSH key on the server.
      Using existing key from authorized_keys.
  when: termius_key_found | bool
  tags: users

- name: Prompt for Local Machine SSH public key if not provided
  ansible.builtin.pause:
    prompt: |

      ================================================================================
      LOCAL MACHINE - SSH PUBLIC KEY REQUIRED
      ================================================================================
      Please paste your LOCAL MACHINE SSH PUBLIC key (starts with 'ssh-rsa', 'ssh-ed25519', etc.):
  register: ssh_key_prompt_local
  when:
    - not (termius_key_found | bool)
    - vps_prompt_for_ssh_key | bool
    - vps_app_user_ssh_public_key_local | length == 0
  tags: users

- name: Set Local Machine SSH public key from prompt
  ansible.builtin.set_fact:
    vps_app_user_ssh_public_key_local: "{{ ssh_key_prompt_local.user_input | trim }}"
  when:
    - ssh_key_prompt_local is defined
    - ssh_key_prompt_local.user_input is defined
    - ssh_key_prompt_local.user_input | trim | length > 0
  tags: users

- name: Validate Local Machine SSH key format
  ansible.builtin.assert:
    that:
      - vps_app_user_ssh_public_key_local is regex('^(ssh-rsa|ssh-ed25519|ecdsa-sha2-nistp[0-9]+) [A-Za-z0-9+/=]+ ?.*$')
    fail_msg: |
      SSH key appears invalid or truncated!
      Key starts with: {{ vps_app_user_ssh_public_key_local[:50] }}...
      Key ends with: ...{{ vps_app_user_ssh_public_key_local[-50:] }}
      Make sure you pasted the COMPLETE key from your .pub file.
  when:
    - not (termius_key_found | bool)
    - vps_app_user_ssh_public_key_local | length > 0
  tags: users

- name: Prompt for GitHub Actions SSH public key if not provided
  ansible.builtin.pause:
    prompt: |

      ================================================================================
      GITHUB ACTIONS - SSH PUBLIC KEY REQUIRED
      ================================================================================
      Please paste your GITHUB ACTIONS SSH PUBLIC key (starts with 'ssh-rsa', 'ssh-ed25519', etc.):
  register: ssh_key_prompt_github_actions
  when:
    - vps_github_actions_ssh_required | bool
    - vps_prompt_for_ssh_key | bool
    - vps_app_user_ssh_public_key_github_actions | length == 0
  tags: users

- name: Set GitHub Actions SSH public key from prompt
  ansible.builtin.set_fact:
    vps_app_user_ssh_public_key_github_actions: "{{ ssh_key_prompt_github_actions.user_input | trim }}"
  when:
    - ssh_key_prompt_github_actions is defined
    - ssh_key_prompt_github_actions.user_input is defined
    - ssh_key_prompt_github_actions.user_input | trim | length > 0
  tags: users

- name: Validate GitHub Actions SSH key format
  ansible.builtin.assert:
    that:
      - vps_app_user_ssh_public_key_github_actions is regex('^(ssh-rsa|ssh-ed25519|ecdsa-sha2-nistp[0-9]+) [A-Za-z0-9+/=]+ ?.*$')
    fail_msg: |
      GitHub Actions SSH key appears invalid or truncated!
      Make sure you pasted the COMPLETE key from your .pub file.
  when: vps_app_user_ssh_public_key_github_actions | length > 0
  tags: users

- name: Validate Local Machine SSH key is provided
  ansible.builtin.fail:
    msg: "Local Machine SSH public key is required!"
  when: vps_app_user_ssh_public_key_local | length == 0
  tags: users

- name: Write Local Machine SSH public key (exclusive - overwrites authorized_keys)
  ansible.posix.authorized_key:
    user: "{{ vps_app_user }}"
    key: "{{ vps_app_user_ssh_public_key_local }}"
    comment: "local-machine"
    state: present
    exclusive: true
  when: not (termius_key_found | bool)
  tags: users

- name: Ensure Termius SSH key is present in authorized_keys
  ansible.posix.authorized_key:
    user: "{{ vps_app_user }}"
    key: "{{ vps_app_user_ssh_public_key_local }}"
    state: present
    exclusive: true
  when: termius_key_found | bool
  tags: users

- name: Add GitHub Actions SSH public key
  ansible.posix.authorized_key:
    user: "{{ vps_app_user }}"
    key: "{{ vps_app_user_ssh_public_key_github_actions }}"
    comment: "github-actions"
    state: present
    exclusive: false
  when: vps_app_user_ssh_public_key_github_actions | length > 0
  tags: users

- name: Ensure correct permissions on authorized_keys
  ansible.builtin.file:
    path: "{{ vps_app_user_home }}/.ssh/authorized_keys"
    owner: "{{ vps_app_user }}"
    group: "{{ vps_app_group }}"
    mode: '0600'
  tags: users

- name: Count expected SSH keys
  ansible.builtin.set_fact:
    expected_ssh_key_count: "{{ 2 if vps_app_user_ssh_public_key_github_actions | length > 0 else 1 }}"
  tags: users

- name: Verify SSH keys were written correctly
  ansible.builtin.command:
    cmd: "grep -c 'ssh-' {{ vps_app_user_home }}/.ssh/authorized_keys"
  register: ssh_key_check
  changed_when: false
  failed_when: ssh_key_check.rc != 0 or ssh_key_check.stdout | int < expected_ssh_key_count | int
  tags: users

- name: Set up passwordless sudo for application user
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/{{ vps_app_user }}
    line: '{{ vps_app_user }} ALL=(ALL) NOPASSWD:ALL'
    create: true
    validate: 'visudo -cf %s'
    mode: '0440'
  tags: users
