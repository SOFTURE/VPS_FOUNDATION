---
all:
  hosts:
    vps:
      ansible_host: "{{ vps_host }}"
      ansible_user: "{{ vps_user }}"
      ansible_ssh_private_key_file: "{{ vps_ssh_private_key_file }}"
      ansible_port: "{{ vps_port }}"
  vars:
    vps_app_user: user
    vps_timezone: "Europe/Warsaw"
    vps_locale: "en_US.UTF-8"
    vps_app_user_ssh_public_key_local: ""
    vps_app_user_ssh_public_key_github_actions: ""
