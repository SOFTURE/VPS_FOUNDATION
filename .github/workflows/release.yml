name: Release Collection

on:
  push:
    branches:
      - master

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[SKIP CI]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          tag=$(git tag -l '[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$tag" ]; then
            tag="1.0.0"
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Bump minor version
        id: version
        run: |
          current="${{ steps.latest_tag.outputs.tag }}"
          IFS='.' read -r major minor patch <<< "$current"
          minor=$((minor + 1))
          new_version="${major}.${minor}.0"
          echo "version=$new_version" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: pip install ansible

      - name: Set version in galaxy.yml
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" vps_foundation/galaxy.yml

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add vps_foundation/galaxy.yml
          git commit -m "[SKIP CI] bump version to ${{ steps.version.outputs.version }}"
          git push origin master

      - name: Build collection
        run: |
          cd vps_foundation
          ansible-galaxy collection build

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: "vps_foundation/*.tar.gz"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
