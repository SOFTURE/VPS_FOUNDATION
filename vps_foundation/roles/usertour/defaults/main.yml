---
usertour_enabled: false
usertour_container_name: usertour
usertour_image: usertour/usertour:0.8.7
usertour_image_override: ""
usertour_restart_policy: always
usertour_network: app-network
usertour_extra_networks: []

usertour_db_host: postgres
usertour_db_port: 5432
usertour_db_name: usertour_db
usertour_db_schema: usertour
postgres_user: "{{ postgres_user }}"
postgres_password: "{{ postgres_password }}"

usertour_redis_host: redis
usertour_redis_port: 6379
usertour_redis_password: ""
usertour_redis_user: ""
usertour_redis_tls: false

usertour_jwt_secret: ""
usertour_jwt_expiration_time: 1h
usertour_jwt_refresh_expiration_time: 7d

usertour_api_url: ""
usertour_homepage_url: "{{ usertour_api_url }}"
usertour_cookie_secure: true
usertour_cookie_domain: ""

usertour_email_auth_enabled: true

usertour_s3_region: ""
usertour_s3_endpoint: ""
usertour_s3_access_key_id: ""
usertour_s3_secret_access_key: ""
usertour_s3_bucket: ""
usertour_s3_domain: ""

usertour_admin_name: ""
usertour_admin_email: ""
usertour_admin_password: ""

usertour_extra_env: {}

usertour_memory_limit: ""
usertour_memory_reservation: ""
usertour_cpus: ""
